  .button1 {
    position: relative;
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    border: 1px solid;
    border-radius: 20px;

    transition: transform 1s ease, color 1s ease, background-image 1s ease;

   
    
    background: linear-gradient(-45deg, #000000, #1a2a6c, #0052d4, #000000);
   
    background-size: 400% 400%;
   
    animation: gradientBG_BlueBlack 5s ease infinite;
  
    color: white;
  }

  
  .button1:hover {
    transform: scale(1.5); 
    
    
    color: #1a2a6c; 
    
    
    background: linear-gradient(-45deg, #ffffff, #a1c4fd, #c2e9fb, #ffffff);
    
    background-size: 400% 400%;
   
    animation: gradientBG_WhiteBlue 3s ease infinite; 
  }

  .button1:active {
    transform: scale(0.95); 
  }

 


  @keyframes gradientBG_BlueBlack {
    0% { background-position: 100% 50%; }
    50% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }
  @keyframes gradientBG_WhiteBlue {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

nav a {
  position: relative;
  color: #0072ff;
  text-decoration: none;
  font-family: sans-serif;
  padding: 5px 10px;
  font-size: 20px;
}

nav a::after {
  content: '';
  position: absolute;
  width: 0;
  height: 3px;
  bottom: 0;
  left: 0;
  background-color: #0072ff; 
  transition: width 0.3s ease;
  box-shadow: 0 0 10px #0072ff; 
}

nav a:hover::after {
  width: 100%;
}

/* 2. Full Width Animated Stripe Below Entire Navbar */
.navbar {
  background: #000000;
  padding: 20px;
  position: relative;
  border-bottom: 4px solid #0072ff; /* Darker blue base */
}

.navbar::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00d2ff, transparent);
  animation: slide 3s linear infinite;
}

@keyframes slide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
